name: testflight
# Build, sign (cloud-managed: Xcode automatic signing + an App Store Connect API
# key), and upload Uncorked to TestFlight from a hosted macOS runner. No Mac and
# no stored certificates required.
#
# NOTE: cloud signing mints a fresh distribution certificate on each ephemeral
# runner, so the account needs a FREE certificate slot per build. When that gets
# annoying, switch to the match pipeline (fastlane beta + bootstrap-signing.yml).
#
# Fires on a pushed v* tag or a manual dispatch. Secrets are read at run time.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build-and-upload:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          set -e
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          [ -n "$latest" ] || { echo "No Xcode found"; exit 1; }
          echo "Selecting $latest"
          sudo xcode-select -s "$latest/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Write App Store Connect API key
        run: |
          echo "${{ secrets.ASC_KEY_P8_BASE64 }}" | openssl base64 -d -A > "$RUNNER_TEMP/asc.p8"
          test -s "$RUNNER_TEMP/asc.p8" || { echo "Decoded .p8 is empty"; exit 1; }

      - name: Archive
        run: |
          xcodebuild archive \
            -project Flowtear.xcodeproj -scheme Flowtear -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/Flowtear.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }}

      - name: Export .ipa
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Flowtear.xcarchive" \
            -exportOptionsPlist App/Support/ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

      - name: Upload to TestFlight (fastlane pilot)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILEPATH: ${{ runner.temp }}/asc.p8
        run: |
          IPA_PATH=$(ls "$RUNNER_TEMP"/export/*.ipa | head -1)
          echo "Uploading $IPA_PATH"
          set +e
          IPA_PATH="$IPA_PATH" fastlane upload_testflight 2>&1 | tee "$RUNNER_TEMP/upload.log"
          status=${PIPESTATUS[0]}
          set -e
          # fastlane itself reported success — done.
          if [ "$status" -eq 0 ]; then echo "Upload succeeded."; exit 0; fi
          # fastlane exited nonzero, but the binary may have been delivered before a
          # transient post-upload error (Apple 500 on a status poll). Accept the known
          # delivery markers; a genuine rejection (validation 409) has none of them.
          if grep -qE "Successfully uploaded package to App Store Connect|UPLOAD SUCCEEDED with no errors|No errors uploading archive" "$RUNNER_TEMP/upload.log"; then
            echo "Binary delivered to App Store Connect (ignoring transient post-upload error)."
            exit 0
          fi
          echo "::error::TestFlight upload did not report success — see the log above."
          exit 1

      - name: Remove API key
        if: always()
        run: rm -f "$RUNNER_TEMP/asc.p8"
