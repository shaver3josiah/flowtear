name: testflight
# Build, sign, and upload Uncorked to TestFlight from a hosted macOS runner.
# Signing uses fastlane MATCH: the permanent Apple Distribution cert + App Store
# profile are fetched read-only from the flowtear-certs repo — no per-runner
# certificate creation, so the account's certificate cap is never hit.
#
# pilot waits for Apple's post-upload processing, so a green run means the build
# is actually visible in TestFlight; a red run carries the real reason.
#
# Fires on a pushed v* tag or a manual dispatch. Secrets are read at run time.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build-and-upload:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          set -e
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          [ -n "$latest" ] || { echo "No Xcode found"; exit 1; }
          echo "Selecting $latest"
          sudo xcode-select -s "$latest/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Write App Store Connect API key
        run: |
          echo "${{ secrets.ASC_KEY_P8_BASE64 }}" | openssl base64 -d -A > "$RUNNER_TEMP/asc.p8"
          test -s "$RUNNER_TEMP/asc.p8" || { echo "Decoded .p8 is empty"; exit 1; }

      - name: Build & upload (fastlane beta — match signing, waits for processing)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILEPATH: ${{ runner.temp }}/asc.p8
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          # Credential-in-URL auth for the match repo (Basic header proved flaky
          # with Windows-set secrets); derived values are masked from logs.
          pair=$(printf '%s' "$MATCH_GIT_BASIC_AUTHORIZATION" | tr -d '\r\n ' | openssl base64 -d -A)
          echo "::add-mask::$pair"
          token="${pair#*:}"
          echo "::add-mask::$token"
          export MATCH_GIT_URL="https://x-access-token:${token}@github.com/shaver3josiah/flowtear-certs.git"
          unset MATCH_GIT_BASIC_AUTHORIZATION
          fastlane beta

      - name: Remove API key
        if: always()
        run: rm -f "$RUNNER_TEMP/asc.p8"
