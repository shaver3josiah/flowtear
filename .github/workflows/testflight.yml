name: testflight
# Build, sign, and upload Flowtear to TestFlight from a hosted macOS runner.
# Signing uses fastlane MATCH — the Apple Distribution cert + App Store profile
# are fetched (read-only) from the match repo, so this never creates a per-runner
# certificate and never hits the account's certificate cap.
#
# PREREQ: run the "bootstrap-signing" workflow ONCE first to populate the match repo.
# Fires on a pushed v* tag or a manual dispatch. Secrets are read at run time, so a
# corrected secret takes effect on a plain "Re-run".
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build-and-upload:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          set -e
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          [ -n "$latest" ] || { echo "No Xcode found"; exit 1; }
          echo "Selecting $latest"
          sudo xcode-select -s "$latest/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Write App Store Connect API key
        run: |
          echo "${{ secrets.ASC_KEY_P8_BASE64 }}" | openssl base64 -d -A > "$RUNNER_TEMP/asc.p8"
          test -s "$RUNNER_TEMP/asc.p8" || { echo "Decoded .p8 is empty"; exit 1; }

      - name: Build & upload to TestFlight (fastlane match + pilot)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILEPATH: ${{ runner.temp }}/asc.p8
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: fastlane beta

      - name: Remove API key
        if: always()
        run: rm -f "$RUNNER_TEMP/asc.p8"
