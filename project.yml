# XcodeGen spec for Flowtear. Generate the .xcodeproj with `xcodegen generate`.
# Mirrors the BloomCalculator setup (iOS 17, automatic signing, CI-built).
name: Flowtear
options:
  bundleIdPrefix: com.shaver
  deploymentTarget:
    iOS: "17.0"
targets:
  Flowtear:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
        excludes:
          # Build-config plist, not an app resource — keep it out of the bundle.
          # (PrivacyInfo.xcprivacy under App/Support/ IS compiled in on purpose.)
          - "Support/ExportOptions.plist"
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.shaver.flowtear
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "$(BUILD_NUMBER:default=1)"
        DEVELOPMENT_TEAM: "$(APPLE_TEAM_ID)"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.10"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug: {}
        Release: {}
    info:
      path: Generated-Info.plist
      properties:
        CFBundleDisplayName: Uncorked
        ITSAppUsesNonExemptEncryption: false
        # Fonts: drop the OFL .ttf files into App/Resources/Fonts/ to activate.
        # Until then Font.custom falls back to the system font (see Theme.swift).
        UIAppFonts:
          - Quicksand.ttf
          - PlayfairDisplay.ttf
          - PlayfairDisplay-Italic.ttf
          - GreatVibes-Regular.ttf
        # Portrait-only, phone-first. UIRequiresFullScreen opts out of iPad
        # multitasking, which is what lets a universal (iPhone+iPad) app ship
        # without supporting all 4 orientations (App Store validation 409 otherwise).
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen:
          UIColorName: LaunchBackground
  FlowtearTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Flowtear
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: "5.10"
schemes:
  Flowtear:
    build:
      targets:
        Flowtear: all
        FlowtearTests: [test]
    run:
      config: Debug
    test:
      targets:
        - FlowtearTests
    archive:
      config: Release
