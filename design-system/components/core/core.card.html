<!-- @dsCard group="Components" viewport="700x760" name="Core — buttons, inputs, surfaces" subtitle="Buttons, chips, badges, tabs, switches & rows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-body); color: var(--text); padding: 24px; }
  .wrap { display: flex; flex-direction: column; gap: 22px; max-width: 640px; }
  .sec { display: flex; flex-direction: column; gap: 10px; }
  .sec > .lbl { font-size: 11px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--muted); }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .ico { display: inline-flex; align-items: center; justify-content: center; }
  .ico svg { width: 100%; height: 100%; display: block; }
  .panel { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-card); padding: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Button, IconButton, Card, Chip, Badge, SegmentedTabs, Switch, ListRow } = window.FlowtierDesignSystem_6b3d0d;
const Ico = ({ name, size = 18 }) => {
  const ref = React.useRef(null);
  React.useEffect(() => { const el = ref.current; if (!el) return; el.innerHTML = '<i data-lucide="' + name + '"></i>'; if (window.lucide) window.lucide.createIcons(); }, [name, size]);
  return <span ref={ref} className="ico" style={{ width: size, height: size }} />;
};

function Sec({ label, children }) {
  return <div className="sec"><span className="lbl">{label}</span>{children}</div>;
}

function Demo() {
  const [tab, setTab] = React.useState("month");
  const [on1, setOn1] = React.useState(true);
  const [on2, setOn2] = React.useState(false);
  const [chip, setChip] = React.useState("calm");
  return (
    <div className="wrap">
      <Sec label="Button — variants">
        <div className="row">
          <Button>Log today</Button>
          <Button variant="deep">Start</Button>
          <Button variant="soft">Edit dates</Button>
          <Button variant="ghost">Skip</Button>
          <Button disabled>Disabled</Button>
        </div>
      </Sec>
      <Sec label="Button — sizes & icons">
        <div className="row">
          <Button size="sm">Small</Button>
          <Button size="md" iconLeft={<Ico name="plus" />}>Add symptom</Button>
          <Button size="lg" variant="soft" iconRight={<Ico name="arrow-right" />}>Continue</Button>
        </div>
      </Sec>
      <Sec label="IconButton">
        <div className="row">
          <IconButton label="prev" variant="soft"><Ico name="chevron-left" /></IconButton>
          <IconButton label="next" variant="ghost"><Ico name="chevron-right" /></IconButton>
          <IconButton label="add" variant="primary"><Ico name="plus" /></IconButton>
        </div>
      </Sec>
      <Sec label="Chip & Badge">
        <div className="row">
          <Chip selected={chip === "calm"} onClick={() => setChip("calm")} icon={<Ico name="smile" size={15} />}>Calm</Chip>
          <Chip selected={chip === "happy"} onClick={() => setChip("happy")}>Happy</Chip>
          <Chip selected={chip === "low"} onClick={() => setChip("low")}>Low</Chip>
          <Badge tone="menstrual" dot>Day 2</Badge>
          <Badge tone="fertile" dot>Fertile</Badge>
          <Badge tone="good" dot>On track</Badge>
        </div>
      </Sec>
      <Sec label="SegmentedTabs">
        <SegmentedTabs value={tab} onChange={setTab} options={[{ value: "week", label: "Week" }, { value: "month", label: "Month" }, { value: "year", label: "Year" }]} />
      </Sec>
      <Sec label="Card — surfaces">
        <div className="row" style={{ alignItems: "stretch" }}>
          <Card style={{ flex: 1, minWidth: 150 }}><b style={{ color: "var(--deep)" }}>Plain</b><div style={{ color: "var(--muted)", fontSize: 13, marginTop: 4 }}>White + soft shadow</div></Card>
          <Card variant="soft" style={{ flex: 1, minWidth: 150 }}><b style={{ color: "var(--deep)" }}>Soft</b><div style={{ color: "var(--muted)", fontSize: 13, marginTop: 4 }}>Tinted panel</div></Card>
          <Card variant="outline" style={{ flex: 1, minWidth: 150 }}><b style={{ color: "var(--deep)" }}>Outline</b><div style={{ color: "var(--muted)", fontSize: 13, marginTop: 4 }}>Hairline border</div></Card>
        </div>
      </Sec>
      <Sec label="ListRow + Switch">
        <div className="panel">
          <ListRow icon={<Ico name="bell" />} title="Period reminder" subtitle="2 days before" trailing={<Switch checked={on1} onChange={setOn1} label="Period reminder" />} />
          <ListRow icon={<Ico name="pill" />} title="Pill reminder" subtitle="Daily at 9:00" trailing={<Switch checked={on2} onChange={setOn2} label="Pill reminder" />} />
          <ListRow icon={<Ico name="palette" />} title="Theme" trailing={<><span>Cherry</span><Ico name="chevron-right" size={16} /></>} onClick={() => {}} />
        </div>
      </Sec>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
setTimeout(() => window.lucide && window.lucide.createIcons(), 30);
</script>
</body>
</html>
