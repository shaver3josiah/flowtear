<!-- @dsCard group="Type" viewport="700x280" name="Type families" subtitle="Quicksand · Playfair Display · Great Vibes" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 24px; }
  .fam { padding: 14px 0; border-bottom: 1px solid var(--line); }
  .fam:last-child { border-bottom: none; }
  .meta { font-family: var(--font-body); font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .samp-body { font-family: var(--font-body); font-size: 22px; font-weight: 500; color: var(--text); }
  .samp-disp { font-family: var(--font-display); font-size: 30px; font-weight: 600; color: var(--deep); }
  .samp-script { font-family: var(--font-script); font-size: 40px; color: var(--primary-strong); line-height: 1; }
</style></head>
<body>
  <div class="fam"><div class="meta">Quicksand · --font-body · UI, labels, running text</div><div class="samp-body">How are you feeling today, love?</div></div>
  <div class="fam"><div class="meta">Playfair Display · --font-display · headings & numerals</div><div class="samp-disp">Your next bloom is in 6 days</div></div>
  <div class="fam"><div class="meta">Great Vibes · --font-script · splash & affectionate accents</div><div class="samp-script">beautifully yours</div></div>
</body></html>
