<!-- @dsCard group="Spacing" viewport="700x220" name="Spacing scale" subtitle="4px-based soft rhythm — --space-1 … --space-10" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 24px; font-family: var(--font-body); }
  .r { display: flex; align-items: center; gap: 12px; padding: 3px 0; }
  .bar { height: 14px; background: var(--primary); border-radius: 4px; }
  .n { font-size: 11.5px; color: var(--muted); font-weight: 600; width: 130px; }
</style></head>
<body>
  <div class="r"><span class="n">--space-1 · 4</span><span class="bar" style="width:4px"></span></div>
  <div class="r"><span class="n">--space-2 · 8</span><span class="bar" style="width:8px"></span></div>
  <div class="r"><span class="n">--space-3 · 12</span><span class="bar" style="width:12px"></span></div>
  <div class="r"><span class="n">--space-4 · 16</span><span class="bar" style="width:16px"></span></div>
  <div class="r"><span class="n">--space-5 · 20</span><span class="bar" style="width:20px"></span></div>
  <div class="r"><span class="n">--space-6 · 24</span><span class="bar" style="width:24px"></span></div>
  <div class="r"><span class="n">--space-7 · 32</span><span class="bar" style="width:32px"></span></div>
  <div class="r"><span class="n">--space-8 · 40</span><span class="bar" style="width:40px"></span></div>
  <div class="r"><span class="n">--space-9 · 48</span><span class="bar" style="width:48px"></span></div>
  <div class="r"><span class="n">--space-10 · 64</span><span class="bar" style="width:64px"></span></div>
</body></html>
