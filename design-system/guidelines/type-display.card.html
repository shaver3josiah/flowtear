<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />

  .r { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; }
  .t { font-weight: 600; line-height: 1.05; }
  .tag { font-family: var(--font-body); font-size: 11px; color: var(--muted); font-weight: 600; }
</style></head>
<body>
  <div class="r"><span class="t" style="font-size:56px">56</span><span class="tag">--text-4xl · ring day-count</span></div>
  <div class="r"><span class="t" style="font-size:40px">Aa 40</span><span class="tag">--text-3xl · big stats</span></div>
  <div class="r"><span class="t" style="font-size:28px">Screen title 28</span><span class="tag">--text-2xl</span></div>
  <div class="r"><span class="t" style="font-size:22px">Section heading 22</span><span class="tag">--text-xl</span></div>
  <div class="r"><span class="t" style="font-size:18px">Card title 18</span><span class="tag">--text-lg</span></div>
</body></html>
