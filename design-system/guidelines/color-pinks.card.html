<!-- @dsCard group="Colors" viewport="700x150" name="Signature pinks" subtitle="The rose core — petals, strong accent, headlines" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-body); padding: 20px; }
  .sw { display: flex; gap: 14px; flex-wrap: wrap; }
  .chip { display: flex; flex-direction: column; gap: 7px; }
  .box { width: 150px; height: 74px; border-radius: var(--radius-md); box-shadow: var(--sh-1); }
  .n { font-size: 12px; font-weight: 600; color: var(--text); }
  .v { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
</style></head>
<body>
<div class="sw">
  <div class="chip"><div class="box" style="background:var(--primary)"></div><div class="n">--primary · Petals</div><div class="v">#F06FA7</div></div>
  <div class="chip"><div class="box" style="background:var(--primary-strong)"></div><div class="n">--primary-strong</div><div class="v">#E2417F</div></div>
  <div class="chip"><div class="box" style="background:var(--deep)"></div><div class="n">--deep · Headlines</div><div class="v">#B01B58</div></div>
</div>
</body></html>
