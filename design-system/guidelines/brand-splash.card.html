<!-- @dsCard group="Brand" viewport="700x220" name="Splash backdrop" subtitle="The radial bloom gradient & Great Vibes wordmark" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); }
  .grad { height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    background: radial-gradient(120% 90% at 50% 0%, var(--surface-soft), var(--bg) 68%); }
  .mark { font-family: var(--font-script); font-size: 60px; color: var(--deep); line-height: 1; }
  .sub { font-size: 13px; color: var(--muted); letter-spacing: .04em; }
  .cap { position: fixed; left: 16px; bottom: 12px; font-size: 11px; color: var(--muted); font-weight: 600; }
</style></head>
<body>
  <div class="grad">
    <div class="mark">Flowtier</div>
    <div class="sub">bloom with your body</div>
  </div>
  <div class="cap">radial-gradient(--surface-soft → --bg) · used on splash & onboarding</div>
</body></html>
