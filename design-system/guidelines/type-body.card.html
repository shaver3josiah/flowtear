<!-- @dsCard group="Type" viewport="700x250" name="Body scale & weights" subtitle="Quicksand 400 / 500 / 600 / 700" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 24px; font-family: var(--font-body); color: var(--text); }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; }
  .tag { font-size: 11px; color: var(--muted); font-weight: 600; }
  .row2 { display: flex; gap: 22px; margin-top: 14px; }
  .w { font-size: 18px; }
</style></head>
<body>
  <div class="r"><span style="font-size:18px;font-weight:500">Emphasized body · 16 / --text-md</span><span class="tag">500</span></div>
  <div class="r"><span style="font-size:15px;font-weight:400">Default body copy · 15 / --text-base</span><span class="tag">400</span></div>
  <div class="r"><span style="font-size:13px;font-weight:600">Secondary & tab labels · 13 / --text-sm</span><span class="tag">600</span></div>
  <div class="r"><span style="font-size:12px;font-weight:500;color:var(--muted)">Caption / chip meta · 12 / --text-xs</span><span class="tag">500</span></div>
  <div class="row2">
    <span class="w" style="font-weight:400">Regular</span>
    <span class="w" style="font-weight:500">Medium</span>
    <span class="w" style="font-weight:600">Semibold</span>
    <span class="w" style="font-weight:700">Bold</span>
  </div>
</body></html>
