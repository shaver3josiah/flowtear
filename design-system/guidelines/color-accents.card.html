<!-- @dsCard group="Colors" viewport="700x150" name="Accents — gold & growth" subtitle="Flower center gold and the positive green" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-body); padding: 20px; }
  .sw { display: flex; gap: 14px; flex-wrap: wrap; }
  .chip { display: flex; flex-direction: column; gap: 7px; }
  .box { width: 150px; height: 74px; border-radius: var(--radius-md); box-shadow: var(--sh-1); }
  .n { font-size: 12px; font-weight: 600; color: var(--text); }
  .v { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
</style></head>
<body>
<div class="sw">
  <div class="chip"><div class="box" style="background:var(--flower-center)"></div><div class="n">--flower-center · Gold</div><div class="v">#FFC966</div></div>
  <div class="chip"><div class="box" style="background:var(--good)"></div><div class="n">--good · Growth</div><div class="v">#17703B</div></div>
</div>
</body></html>
