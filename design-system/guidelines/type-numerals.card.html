<!-- @dsCard group="Type" viewport="700x200" name="Numerals" subtitle="Playfair numerals — day counts, stats, countdowns" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 24px; font-family: var(--font-body); }
  .row { display: flex; gap: 34px; align-items: flex-end; }
  .stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .num { font-family: var(--font-display); font-weight: 600; color: var(--deep); line-height: 1; font-variant-numeric: tabular-nums; }
  .lab { font-size: 11px; color: var(--muted); font-weight: 600; }
</style></head>
<body>
  <div class="row">
    <div class="stat"><span class="num" style="font-size:72px">6</span><span class="lab">days to period</span></div>
    <div class="stat"><span class="num" style="font-size:56px">14</span><span class="lab">cycle day</span></div>
    <div class="stat"><span class="num" style="font-size:40px">28</span><span class="lab">avg cycle</span></div>
    <div class="stat"><span class="num" style="font-size:40px">5</span><span class="lab">avg period</span></div>
  </div>
</body></html>
